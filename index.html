<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a11y Checklist</title>
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f6f6f4;
  --bg-muted: #f0efec;
  --border: #e2e0db;
  --border-strong: #c8c6c0;
  --text: #1a1a18;
  --text-muted: #6b6966;
  --text-faint: #9e9b96;
  --purple: #3c3489;
  --purple-light: #eeedfe;
  --blue: #185fa5;
  --blue-light: #e6f1fb;
  --green: #1d9e75;
  --green-light: #e1f5ee;
  --amber: #854f0b;
  --amber-light: #faeeda;
  --gray-light: #f1efe8;
  --font: Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "SFMono-Regular", Consolas, monospace;
  --radius: 6px;
  --radius-lg: 10px;
}
[data-theme="dark"] {
  --bg: #1a1a18;
  --bg-soft: #222220;
  --bg-muted: #2a2a28;
  --border: #38372f;
  --border-strong: #4a4840;
  --text: #e8e6e0;
  --text-muted: #9e9b96;
  --text-faint: #6b6966;
  --purple: #b0aaff;
  --purple-light: #2e2a58;
  --blue: #7db8f7;
  --blue-light: #1a3352;
  --green: #4ecba0;
  --green-light: #0d3326;
  --amber: #f0a84a;
  --amber-light: #32200a;
  --gray-light: #252420;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.6; min-height: 100vh; }

.app { min-height: 100vh; display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; }

.topbar { padding: 14px 40px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 14px; font-weight: 600; color: var(--text-muted); flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; cursor: pointer; font-size: 14px; color: var(--text-muted); line-height: 1; transition: background 0.12s; font-family: var(--font); }
.icon-btn:hover { background: var(--bg-muted); color: var(--text); }

.content { flex: 1; padding: 32px 40px 120px; max-width: 820px; margin: 0 auto; width: 100%; }

/* View controls */
.view-controls { display: flex; align-items: center; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 20px; margin-bottom: 28px; gap: 0; }
.view-counter { display: flex; align-items: center; gap: 12px; }
.view-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint); }
.view-num { font-size: 28px; font-weight: 700; color: var(--text); min-width: 32px; text-align: center; }
.view-nav { display: flex; gap: 4px; }
.view-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: background 0.12s; font-family: var(--font); }
.view-btn:hover:not(:disabled) { background: var(--bg-muted); color: var(--text); }
.view-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.view-divider { width: 1px; background: var(--border); height: 32px; margin: 0 20px; }
.view-note { font-size: 13px; color: var(--text-faint); line-height: 1.5; flex: 1; }
.view-note strong { color: var(--text-muted); font-weight: 600; }

/* Phases */
.phase { margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.phase.all-done .checks { display: none; }
.phase.all-done { border-color: var(--green); }
.phase.all-done .phase-header { background: var(--green-light); border-bottom: none; cursor: pointer; }
.phase.all-done .phase-letter { background: var(--green); color: white; }
.phase-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--bg-soft); border-bottom: 1px solid var(--border); }
.phase-letter { font-size: 11px; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.12s, color 0.12s; cursor: pointer; }
.phase-letter[data-letter]::before { content: attr(data-letter); }
.phase-letter[data-letter]:hover::before { content: "✓"; }
.phase-letter[data-letter]:hover { background: var(--green) !important; color: white !important; }
.phase-title { font-size: 15px; font-weight: 600; flex: 1; }
.phase-sub { font-size: 13px; color: var(--text-faint); margin-top: 1px; }
.cadence-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; }
.cadence-view { background: var(--green-light); color: var(--green); }
.cadence-variant { background: var(--purple-light); color: var(--purple); }
.copy-inline { background: none; border: none; cursor: pointer; color: var(--text-faint); padding: 0 4px; transition: color 0.1s; line-height: 1; display: inline-flex; align-items: center; margin-left: auto; flex-shrink: 0; align-self: center; }
.copy-inline:hover { color: var(--text-muted); }
.copy-inline.copied { color: var(--green); }

/* Check items */
.checks { padding: 2px 0; }
.check-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; user-select: none; }
.check-item:last-child { border-bottom: none; }
.check-item:hover:not(.locked) { background: var(--bg-soft); }
.check-item.checked { background: var(--green-light); }
.check-item.checked .check-label { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--green); }
.check-item.locked { opacity: 0.45; cursor: not-allowed; }
.checkbox { width: 18px; height: 18px; border: 1.5px solid var(--border-strong); border-radius: 3px; flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; background: var(--bg); }
.check-item.checked .checkbox { background: var(--green); border-color: var(--green); }
.checkbox-tick { color: white; font-size: 11px; font-weight: 700; opacity: 0; }
.check-item.checked .checkbox-tick { opacity: 1; }
.check-label { font-size: 15px; color: var(--text); line-height: 1.55; flex: 1; }
.check-label strong { font-weight: 600; }
.check-hint { font-size: 12px; color: var(--blue); font-family: var(--mono); margin-top: 3px; }

/* Phase colors */
.ph-setup .phase-letter { background: var(--gray-light); color: var(--text-muted); }
.ph-keyboard .phase-letter { background: var(--purple-light); color: var(--purple); }
.ph-visual .phase-letter { background: var(--green-light); color: var(--green); }
.ph-sr .phase-letter { background: var(--blue-light); color: var(--blue); }
.ph-doc .phase-letter { background: var(--amber-light); color: var(--amber); }

/* Action bar */
.action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 14px 40px; display: flex; align-items: center; gap: 10px; z-index: 20; }
.btn-primary { background: var(--purple); color: white; border: none; border-radius: var(--radius); padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity 0.12s; }
.btn-primary:hover { opacity: 0.86; }
.btn-ghost { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-size: 14px; color: var(--text-muted); cursor: pointer; font-family: var(--font); transition: background 0.12s; }
.btn-ghost:hover { background: var(--bg-muted); color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">a11y Checklist</span>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleTheme()">◐</button>
      </div>
    </div>

    <div class="content" id="content"></div>

    <div class="action-bar">
      <button class="btn-ghost" onclick="clearAll()">Reset all checks</button>
      <div style="flex:1;"></div>
      <button class="btn-ghost" onclick="prevView()">← Prev view</button>
      <button class="btn-primary" onclick="nextView()">Next view →</button>
    </div>
  </div>
</div>

<script>
const PHASES = [
  {
    id: "setup", letter: "A", title: "Pre-scan setup", type: "ph-setup", cadence: "variant",
    checks: [
      { id: "a1", label: "NVDA is running. Chrome is the active browser." },
      { id: "a2", label: "Mouse is disconnected or disabled. Keyboard only." },
      { id: "a3", label: "Zoom is at 100%. Browser at default font size." },
      { id: "a4", label: "Findings log is open with a blank row ready." },
      { id: "a5", label: "NVDA is in Browse Mode — single-key shortcuts (H, D, K\u2026) only work in Browse Mode. After interacting with any form field, press Escape to return. Mouse clicks do not restore Browse Mode.", hint: "Escape to return to Browse Mode" },
    ]
  },
  {
    id: "keyboard", letter: "B", title: "Keyboard & Focus Testing", type: "ph-keyboard", cadence: "view",
    sub: "The low-hanging fruit where most blockers are found.",
    checks: [
      { id: "b1", label: "Tab order. Navigate from the top of the page to the bottom using only the Tab key. The order should be logical (top-to-bottom, left-to-right)." },
      { id: "b2", label: "Focus visible. As you tab, is there a clear visual outline showing which element is active?" },
      { id: "b3", label: "Keyboard traps. Can you get into \u2014 and out of \u2014 every menu, modal, and form field without getting stuck?" },
      { id: "b4", label: "Skip links. Is there a 'Skip to Main Content' link that appears on the first Tab press?" },
    ]
  },
  {
    id: "visual", letter: "C", title: "Visual & Sensory Check", type: "ph-visual", cadence: "variant",
    checks: [
      { id: "c1", label: "Color contrast. Check text against its background. WCAG 2.1 AA requires a ratio of at least 4.5:1 for regular text and 3:1 for large text." },
      { id: "c2", label: "Use of color. Ensure information isn't conveyed only by color (e.g., an error shouldn't just be a red box \u2014 it needs an 'Error' label or icon)." },
      { id: "c3", label: "Zoom & reflow. Use Ctrl + to zoom to 400%. Does the content overlap, or does it reflow into a single column without horizontal scrolling?", hint: "Ctrl + to 400%" },
      { id: "c4", label: "Text spacing. Use a bookmarklet to increase line height and letter spacing. Does the text break or disappear?" },
    ]
  },
  {
    id: "landmarks", letter: "D", title: "Landmarks", type: "ph-sr", cadence: "view",
    checks: [
      { id: "d1", label: "Check the Elements List for landmarks.", hint: "D / Shift+D to jump forward/backward by landmark" },
      { id: "d2", label: "Landmarks appear in a logical order and contain appropriate content." },
      { id: "d3", label: "\u2b50 No landmarks present.", star: true },
      { id: "d4", label: "\u2b50 Content within landmarks is not logical.", star: true },
      { id: "d5", label: "\u2b50 Multiple landmarks of the same type have a unique name.", star: true },
    ]
  },
  {
    id: "headings", letter: "E", title: "Headings", type: "ph-sr", cadence: "view",
    checks: [
      { id: "e1", label: "Check the Elements List for headings.", hint: "H / Shift+H to jump forward/backward by heading" },
      { id: "e2", label: "Headings appear at the beginning of sections and form a logical outline of the page (H1 > H2 > H3)." },
      { id: "e3", label: "The heading markup indicates the appropriate heading level for the content." },
      { id: "e4", label: "\u2b50 There are no headings present.", star: true },
      { id: "e5", label: "\u2b50 Heading order is skipped.", star: true },
      { id: "e6", label: "\u2b50 Content is improperly assigned as a heading.", star: true },
    ]
  },
  {
    id: "links", letter: "F", title: "Links", type: "ph-sr", cadence: "view",
    checks: [
      { id: "f1", label: "Check the Elements List for links.", hint: "K / Shift+K to jump forward/backward by link" },
      { id: "f2", label: "Links appear in a logical order." },
      { id: "f3", label: "Link text is unique and contextual within the surrounding content." },
      { id: "f4", label: "\u2b50 Links are not announced as links.", star: true },
      { id: "f5", label: "\u2b50 Things that are clickable with the mouse cannot be navigated to and/or activated with the keyboard.", star: true },
      { id: "f6", label: "\u2b50 Link text is not unique or is not contextual within the surrounding content.", star: true },
    ]
  },
  {
    id: "forms", letter: "G", title: "Forms", type: "ph-sr", cadence: "view",
    checks: [
      { id: "g1", label: "Check the Elements List for form elements.", hint: "F / Shift+F (Focus Mode) or Tab / Shift+Tab (Browse Mode)" },
      { id: "g2", label: "Form elements appear in a logical order." },
      { id: "g3", label: "Combobox select lists can be opened with Alt+Down Arrow or Spacebar.", hint: "Alt+\u2193 or Spacebar" },
      { id: "g4", label: "When tabbing into each field, NVDA announces label, role, required state, current value, hint/description, and error state. Any of these missing is a failure." },
      { id: "g5", label: "Required fields announced as 'required' \u2014 not just marked with *." },
      { id: "g6", label: "\u2b50 Cannot navigate to form elements using screen reader or keyboard.", star: true },
      { id: "g7", label: "\u2b50 Form elements are not in a logical order.", star: true },
      { id: "g8", label: "\u2b50 Required form elements are not announced as 'required'.", star: true },
    ]
  },
  {
    id: "errors", letter: "H", title: "Error messages", type: "ph-sr", cadence: "view",
    checks: [
      { id: "h1", label: "Activate error messages via Submit or inline validation." },
      { id: "h2", label: "The error message identifies the error and informs the user of the correct remediation in an apparent and accessible manner." },
      { id: "h3", label: "The form can be resubmitted and revalidated after correction." },
      { id: "h4", label: "\u2b50 Errors are not automatically announced after submitting the form.", star: true },
      { id: "h5", label: "\u2b50 The first field with an error does not get focus after submitting the form.", star: true },
      { id: "h6", label: "\u2b50 Errors are not associated with form elements when you navigate to them.", star: true },
      { id: "h7", label: "\u2b50 Invalid form elements are not announced as 'invalid'.", star: true },
    ]
  },
  {
    id: "tables", letter: "I", title: "Tables (if present)", type: "ph-sr", cadence: "view",
    checks: [
      { id: "i1", label: "Navigate between tables.", hint: "T / Shift+T" },
      { id: "i2", label: "Navigate table content including all static and interactive elements.", hint: "Ctrl+Alt+Arrow keys" },
      { id: "i3", label: "Table headers are identified and announced when navigating cells." },
      { id: "i4", label: "\u2b50 Content that appears as a table is not announced as a table.", star: true },
      { id: "i5", label: "\u2b50 Table headers are not identified.", star: true },
    ]
  },
  {
    id: "focus", letter: "J", title: "Reading order & focus", type: "ph-sr", cadence: "view",
    checks: [
      { id: "j1", label: "Use arrow keys to read content in a linear order.", hint: "Arrow keys" },
      { id: "j2", label: "\u2b50 Trigger dynamic content and confirm it is announced.", star: true },
      { id: "j3", label: "\u2b50 Activate a menu or dialog by placing focus on that element and confirm NVDA announces it.", star: true },
      { id: "j4", label: "\u2b50 Check that visually hidden content is not read in cases where it should not be.", star: true },
      { id: "j5", label: "All actionable elements receive focus on Tab." },
      { id: "j6", label: "No non-actionable elements receive focus on Tab." },
      { id: "j7", label: "\u2b50 The reading order is out of sequence.", star: true },
      { id: "j8", label: "\u2b50 Actionable elements don't get focus when using Tab.", star: true },
      { id: "j9", label: "\u2b50 Non-actionable elements get focus when using Tab.", star: true },
    ]
  },
  {
    id: "sr", letter: "K", title: "Screen Reader Deep Dive", type: "ph-sr", cadence: "view",
    sub: "Navigate the site with your eyes closed or monitor off.",
    checks: [
      { id: "k1", label: "Alt text. Do images have descriptive text? Functional images (like a search magnifying glass) should describe the action, not the appearance.", hint: "NVDA announces alt text on images" },
      { id: "k2", label: "Form labels. When you tab into an input field, does the screen reader announce what it is? (e.g., 'Email Address, edit text')" },
      { id: "k3", label: "Dynamic content. If you click a button that opens a toast notification or updates content, does the screen reader announce that change automatically (using aria-live)?" },
    ]
  },
];

// ── State ──────────────────────────────────────────────────────
const state = { checked: new Set(), locked: new Set(), view: 1 };

// ── Icons ──────────────────────────────────────────────────────
const COPY_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const COPY_SVG_LG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const CHECK_SVG_LG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

// ── Render ──────────────────────────────────────────────────────
function render() {
  const s = state;

  const viewHTML = `
    <div class="view-controls">
      <div class="view-counter">
        <span class="view-label">View</span>
        <span class="view-num">${s.view}</span>
        <div class="view-nav">
          <button class="view-btn" onclick="prevView()" ${s.view <= 1 ? 'disabled' : ''}>−</button>
          <button class="view-btn" onclick="nextView()">+</button>
        </div>
      </div>
      <div class="view-divider"></div>
      <div class="view-note">
        <strong>Per-view checks</strong> reset on each new view. <strong>Per-variant checks</strong> lock after first tick — double-click to unlock.<br>
        NVDA Browse Mode. after a form field, press <code style="font-family:var(--mono);font-size:11px;background:var(--bg-muted);padding:1px 4px;border-radius:3px;">Escape</code> to return — mouse clicks do not restore Browse Mode.
      </div>
    </div>`;

  const phasesHTML = PHASES.map(phase => {
    const isVariant = phase.cadence === "variant";
    const checksHTML = phase.checks.map(c => {
      const isChecked = s.checked.has(c.id);
      const isLocked = s.locked.has(c.id) && !isChecked;
      return `<div class="check-item ${isChecked ? 'checked' : ''} ${isLocked ? 'locked' : ''}"
        onclick="toggleCheck('${c.id}','${phase.cadence}')"
        ondblclick="forceUncheck('${c.id}')"
        role="checkbox" aria-checked="${isChecked}" tabindex="0"
        onkeydown="if(event.key===' '||event.key==='Enter'){toggleCheck('${c.id}','${phase.cadence}');event.preventDefault()}">
        <div class="checkbox"><span class="checkbox-tick">✓</span></div>
        <div class="check-label">${c.label}${c.hint ? `<div class="check-hint">${c.hint}</div>` : ''}</div>
        <button class="copy-inline" onclick="copyCheck(event,this,'${c.id}')">${COPY_SVG}</button>
      </div>`;
    }).join("");

    const allDone = phase.checks.every(c => s.checked.has(c.id));

    return `<div class="phase ${phase.type} ${allDone ? 'all-done' : ''}">
      <div class="phase-header" ${allDone ? `onclick="expandPhase(event,'${phase.id}')"` : ''}>
        <div class="phase-letter" data-letter="${phase.letter}" onclick="toggleAll(event,'${phase.id}')" title="Check / uncheck all"></div>
        <div style="flex:1;min-width:0;">
          <div class="phase-title">${phase.title}</div>
          ${phase.sub ? `<div class="phase-sub">${phase.sub}</div>` : ''}
        </div>
        
        <button class="copy-inline" onclick="copyPhase(event,this,'${phase.id}')">${COPY_SVG_LG}</button>
      </div>
      <div class="checks">${checksHTML}</div>
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML = viewHTML + phasesHTML;
}

// ── Interactions ────────────────────────────────────────────────
function expandPhase(e, phaseId) {
  if (e.target.closest('.copy-inline') || e.target.closest('.phase-letter')) return;
  const checks = e.currentTarget.closest('.phase').querySelector('.checks');
  checks.style.display = checks.style.display === 'block' ? '' : 'block';
}

function doCopy(text, btn, dflt, done) {
  const ok = () => { btn.innerHTML = done; btn.classList.add('copied'); setTimeout(() => { btn.innerHTML = dflt; btn.classList.remove('copied'); }, 1500); };
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(ok).catch(() => fbCopy(text, ok));
  else fbCopy(text, ok);
}
function fbCopy(text, ok) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); ok(); } catch(e) {}
  document.body.removeChild(ta);
}

function stripHTML(html) {
  const d = document.createElement('div'); d.innerHTML = html; return d.textContent || d.innerText || '';
}

function copyCheck(e, btn, id) {
  e.stopPropagation();
  const c = PHASES.flatMap(p => p.checks).find(c => c.id === id);
  doCopy(stripHTML(c.label), btn, COPY_SVG, CHECK_SVG);
}

function copyPhase(e, btn, id) {
  e.stopPropagation();
  const ph = PHASES.find(p => p.id === id);
  const text = `${ph.title}\n${ph.checks.map(c => `• ${stripHTML(c.label)}`).join('\n')}`;
  doCopy(text, btn, COPY_SVG_LG, CHECK_SVG_LG);
}

function toggleAll(e, phaseId) {
  e.stopPropagation();
  const phase = PHASES.find(p => p.id === phaseId);
  const allChecked = phase.checks.every(c => state.checked.has(c.id));
  phase.checks.forEach(c => {
    if (allChecked) { state.checked.delete(c.id); state.locked.delete(c.id); }
    else { state.checked.add(c.id); if (phase.cadence === 'variant') state.locked.add(c.id); }
  });
  render();
}

function forceUncheck(id) {
  state.checked.delete(id); state.locked.delete(id); render();
}

function toggleCheck(id, cadence) {
  if (state.locked.has(id)) return;
  if (state.checked.has(id)) { state.checked.delete(id); }
  else { state.checked.add(id); if (cadence === 'variant') state.locked.add(id); }
  render();
}

function nextView() {
  PHASES.filter(p => p.cadence === 'view').forEach(p => p.checks.forEach(c => state.checked.delete(c.id)));
  state.view++; render(); window.scrollTo(0, 0);
}

function prevView() {
  if (state.view <= 1) return;
  PHASES.filter(p => p.cadence === 'view').forEach(p => p.checks.forEach(c => state.checked.delete(c.id)));
  state.view--; render(); window.scrollTo(0, 0);
}

function clearAll() {
  if (!confirm('Reset all checks and views?')) return;
  state.checked.clear(); state.locked.clear(); state.view = 1; render(); window.scrollTo(0, 0);
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// ── Init ───────────────────────────────────────────────────────
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
render();
</script>
</body>
